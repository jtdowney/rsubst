name: Update Dependencies

on:
  schedule:
    - cron: "0 10 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: never

jobs:
  update-dependencies:
    name: Update Rust Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Update dependencies
        id: update
        run: |
          SUMMARY="$RUNNER_TEMP/update-summary.md"
          echo "## Dependency Updates" > "$SUMMARY"
          echo "" >> "$SUMMARY"

          if UPDATE_OUTPUT=$(cargo update 2>&1); then
            echo "✅ Dependencies updated successfully" >> "$SUMMARY"
          else
            echo "⚠️ Some updates may have failed" >> "$SUMMARY"
          fi

          echo "" >> "$SUMMARY"
          echo "### Changes" >> "$SUMMARY"
          echo '```' >> "$SUMMARY"
          echo "$UPDATE_OUTPUT" >> "$SUMMARY"
          echo '```' >> "$SUMMARY"
      - name: Run security audit
        id: audit
        continue-on-error: true
        run: |
          SUMMARY="$RUNNER_TEMP/update-summary.md"
          echo "" >> "$SUMMARY"
          echo "## Security Audit" >> "$SUMMARY"
          echo "" >> "$SUMMARY"

          if AUDIT_OUTPUT=$(cargo audit 2>&1); then
            echo "✅ No known vulnerabilities detected" >> "$SUMMARY"
          else
            echo "⚠️ Security vulnerabilities found - review required" >> "$SUMMARY"
            echo "" >> "$SUMMARY"
            echo '```' >> "$SUMMARY"
            echo "$AUDIT_OUTPUT" >> "$SUMMARY"
            echo '```' >> "$SUMMARY"
          fi
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-dependencies
          delete-branch: true
          commit-message: "chore: update dependencies"
          title: "chore: update dependencies"
          body-path: ${{ runner.temp }}/update-summary.md
          labels: dependencies
